name: PillPal
description: Aplikasi manajemen pengobatan dengan fitur AI dan Sensor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.8.3
  crypto: ^3.0.3
  intl: 0.18.1
  http: ^1.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  permission_handler: ^11.0.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.0
  sensors_plus: ^4.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  fl_chart: ^0.66.0  # Charts for analytics
  local_auth: ^2.1.7  # Biometric authentication (use upstream version)
  local_auth_android: ^1.0.34
  local_auth_ios: ^1.1.5
  shared_preferences: ^2.2.0  # Persistent storage
  flutter_secure_storage: ^9.0.0  # Secure storage for credentials
  
  # OCR & Image Processing
  google_mlkit_text_recognition: ^0.11.0  # Google ML Kit for OCR
  image_picker: ^1.0.4  # Pick images from camera/gallery
  
  # Markdown Rendering
  flutter_markdown: ^0.7.4+1  # Render markdown text in chat

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true