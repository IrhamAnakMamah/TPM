name: tugas_akhir_tpm
description: Aplikasi manajemen pengobatan dengan fitur AI dan Sensor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  path: ^1.8.3
  crypto: ^3.0.3
  intl: ^0.19.0
  http: ^1.2.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  permission_handler: ^11.0.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.0
  sensors_plus: ^4.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  local_auth: ^2.1.0  # Biometric authentication
  shared_preferences: ^2.2.0  # Persistent storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true